name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Deploy → staging
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST https://rageagent.lol/deploy \
            -H "x-deploy-token: ${{ secrets.DEPLOY_TOKEN }}" \
            && echo "✅ Staging deploy triggered"
