name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy → rageagent.lol
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -sf -X POST https://rageagent.lol/deploy \
            -H "x-deploy-token: ${{ secrets.DEPLOY_TOKEN }}" \
            && echo "✅ Production deploy triggered"
